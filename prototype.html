<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>三瓜两枣收集器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root{
  --bg-base:#fbfaff;--card:#fff;
  --t1:#1a1530;--t2:#5b5378;--t3:#9b94b8;
  --v7:#5b3fcf;--v5:#7c5cfc;--v3:#a78bfa;--v1:#e9e3ff;--v0:#f4f0ff;
  --ok:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --line:rgba(91,63,207,.08);
  --shadow:0 1px 2px rgba(91,63,207,.03),0 4px 16px rgba(91,63,207,.05);
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--t1);min-height:100vh;overflow-x:hidden;line-height:1.4;
  /* 实色兜底，避免动画启动前白屏 */
  background:#f6f3ff;
}

/* ===== 三层云彩渐变 + 颜色慢慢变化（关键修复） ===== */
/* 第 1 层：基础大气层（最慢，60s 周期，色相大幅漂移制造"深紫↔浅紫↔淡蓝"的呼吸） */
body::before{
  content:'';position:fixed;inset:-30%;z-index:-3;pointer-events:none;
  background:
    radial-gradient(50% 45% at 15% 10%, hsla(258,85%,68%,.28) 0%, transparent 55%),
    radial-gradient(45% 40% at 85% 25%, hsla(278,80%,72%,.24) 0%, transparent 58%),
    radial-gradient(55% 50% at 50% 95%, hsla(248,75%,55%,.20) 0%, transparent 65%);
  animation: cloudA 26s ease-in-out infinite alternate, hueA 60s linear infinite;
}
/* 第 2 层：流动云朵（中速，22s，位移明显） */
body::after{
  content:'';position:fixed;inset:-30%;z-index:-2;pointer-events:none;
  background:
    radial-gradient(35% 30% at 70% 45%, hsla(280,85%,80%,.30) 0%, transparent 60%),
    radial-gradient(32% 28% at 25% 70%, hsla(260,80%,75%,.28) 0%, transparent 62%),
    radial-gradient(28% 25% at 45% 30%, hsla(290,90%,85%,.24) 0%, transparent 60%);
  filter: blur(20px);
  animation: cloudB 22s ease-in-out infinite alternate, hueB 45s linear infinite reverse;
}
/* 第 3 层：顶部高光带（像天窗透下来的光，让搜索区有"被云隙光照亮"的感觉） */
.cloud-top{
  position:fixed;top:-30%;left:0;right:0;height:60%;z-index:-1;pointer-events:none;
  background:
    radial-gradient(60% 80% at 30% 0%, hsla(270,90%,80%,.20) 0%, transparent 70%),
    radial-gradient(50% 70% at 75% 10%, hsla(255,85%,75%,.16) 0%, transparent 70%);
  filter: blur(15px);
  animation: cloudC 30s ease-in-out infinite alternate;
}

@keyframes cloudA{
  0%  {transform:translate3d(-15%,10%,0) scale(1.05) rotate(-4deg)}
  100%{transform:translate3d(18%,-12%,0) scale(1.22) rotate(5deg)}
}
@keyframes cloudB{
  0%  {transform:translate3d(12%,-10%,0) scale(1.18) rotate(3deg)}
  100%{transform:translate3d(-16%,12%,0) scale(1.02) rotate(-4deg)}
}
@keyframes cloudC{
  0%  {transform:translate3d(-8%,0,0) scale(1.1);opacity:.7}
  100%{transform:translate3d(8%,-4%,0) scale(1.25);opacity:1}
}
/* 色相漂移：让紫色在 -30° ~ +35° 之间循环，肉眼可辨"颜色在慢慢变" */
@keyframes hueA{
  0%  {filter:hue-rotate(0deg)}
  25% {filter:hue-rotate(-25deg)}
  50% {filter:hue-rotate(15deg)}
  75% {filter:hue-rotate(35deg)}
  100%{filter:hue-rotate(0deg)}
}
@keyframes hueB{
  0%  {filter:blur(20px) hue-rotate(0deg)}
  33% {filter:blur(25px) hue-rotate(-20deg)}
  66% {filter:blur(18px) hue-rotate(25deg)}
  100%{filter:blur(20px) hue-rotate(0deg)}
}

/* ===== Header：单层 sticky，120px 内塞下 logo+搜索+统计 ===== */
.hd{position:sticky;top:0;z-index:50;background:linear-gradient(to bottom,rgba(251,250,255,.85) 70%,rgba(251,250,255,.4));backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);padding:8px 14px 4px;border-bottom:1px solid var(--line)}
.hd .row1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;gap:8px}
.hd .logo{font-family:'ZCOOL KuaiLe','Ma Shan Zheng',cursive;font-size:21px;letter-spacing:3px;padding-left:3px;color:var(--v7);line-height:1.1}
.hd .sub{font-size:10px;color:var(--t3);text-align:right;line-height:1.3;flex-shrink:0}
.hd .sub b{color:var(--v5);font-weight:600;font-variant-numeric:tabular-nums}
.hd .sr-wrap{position:relative;margin-top:1px}
.hd .sr-wrap .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;pointer-events:none}
.hd input{width:100%;padding:7px 14px 7px 30px;border:1.5px solid var(--line);border-radius:18px;font-size:13px;outline:none;background:rgba(255,255,255,.7);color:var(--t1);transition:all .2s;box-shadow:var(--shadow)}
.hd input:focus{border-color:var(--v3);background:#fff}
.hd input::placeholder{color:var(--t3)}

.st{display:flex;padding:5px 0 3px;border-bottom:1px solid var(--line)}
.st .sc{flex:1;text-align:center;padding:1px 2px;cursor:pointer;transition:opacity .15s;position:relative}
.st .sc:not(:last-child)::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:1px;height:16px;background:var(--line)}
.st .sc:active{opacity:.6}
.st .sc b{display:block;font-size:14px;color:var(--v7);font-weight:700;font-variant-numeric:tabular-nums;font-family:"SF Pro Display","DIN Alternate",-apple-system,sans-serif;line-height:1.1}
.st .sc.ze b{color:var(--t3)}
.st .sc.on b{color:var(--v5)}
.st .sc span{font-size:10px;color:var(--t2);margin-top:1px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st .sc.ze span{color:var(--t3)}

.fl{display:flex;gap:5px;padding:5px 14px;overflow-x:auto;position:sticky;top:120px;z-index:48;align-items:center;background:linear-gradient(to bottom,rgba(251,250,255,.85) 70%,rgba(251,250,255,.5));backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px) saturate(180%);border-bottom:1px solid var(--line)}
.fl::-webkit-scrollbar{display:none}
.fl button{flex-shrink:0;padding:4px 10px;border-radius:14px;font-size:11px;border:1.5px solid var(--line);background:rgba(255,255,255,.75);color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
.fl button.on{background:var(--v7);color:#fff;border-color:var(--v7)}
.fl .clr{flex-shrink:0;padding:4px 9px;border-radius:12px;font-size:10px;border:1px dashed var(--v3);background:transparent;color:var(--v5);cursor:pointer;margin-left:auto}
.fl .clr.hide{display:none}

.ct{display:flex;gap:7px;padding:8px 16px;overflow-x:auto;scroll-behavior:smooth}
.ct::-webkit-scrollbar{display:none}
.ct button{flex-shrink:0;padding:5px 12px;border-radius:16px;font-size:12px;border:1.5px solid var(--line);background:rgba(255,255,255,.85);color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap}
.ct button.on{background:var(--v1);border-color:var(--v3);color:var(--v7);font-weight:600}

.ls{padding:8px 14px 80px}
.cd{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s ease-out,box-shadow .12s;position:relative;backdrop-filter:blur(8px)}
.cd:active{transform:scale(.985);box-shadow:0 1px 6px rgba(91,63,207,.04)}
.cd .dot{position:absolute;top:14px;right:14px;width:7px;height:7px;border-radius:50%}
.dot-g{background:var(--ok)}.dot-o{background:var(--warn)}.dot-r{background:var(--danger)}.dot-gy{background:var(--t3)}
.cd .r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:8px;padding-right:14px}
.cd .r1 .n{font-size:15px;font-weight:600;color:var(--t1);line-height:1.3;flex:1}
.cd .r1 .s{font-size:14px;font-weight:700;color:var(--v7);white-space:nowrap;font-variant-numeric:tabular-nums;font-family:"SF Pro Display","DIN Alternate",-apple-system,sans-serif}
.cd .r2{font-size:11px;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.cd .r2 i{display:inline-block;width:2px;height:2px;border-radius:50%;background:var(--t3)}
.cd .r3{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;color:var(--t2)}
.cd .r3 span{font-size:10px}
.cd .sk{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.cd .sk span{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--v1);color:var(--v5);font-weight:500}
.cd .ft{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--t3)}
.cd .ft .tm{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.cd .ft .track{color:var(--v5);font-size:10px}
.t-new{background:rgba(16,185,129,.10);color:var(--ok)}
.t-week{background:rgba(124,92,252,.08);color:var(--v5)}
.t-stale{background:rgba(239,68,68,.06);color:var(--danger)}
.t-ghost{background:rgba(0,0,0,.04);color:var(--t3);text-decoration:line-through}

.em{text-align:center;padding:60px 20px;color:var(--t3);font-size:13px}
.em .big{font-size:32px;margin-bottom:10px;opacity:.6}
.em .btn{display:inline-block;margin-top:14px;padding:7px 18px;border-radius:16px;background:var(--v1);color:var(--v7);font-size:12px;font-weight:600;border:none;cursor:pointer}

/* ===== 详情 Sheet：分区清晰，底部地址模块 ===== */
.ov{position:fixed;inset:0;background:rgba(26,21,48,.45);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.ov.on{display:flex}
.ov .sh{background:rgba(255,255,255,.99);border-radius:20px 20px 0 0;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;padding:14px 18px 26px;animation:slideUp .26s cubic-bezier(.22,.61,.36,1);position:relative}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh .gh{width:36px;height:4px;border-radius:2px;background:var(--v1);margin:0 auto 12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sh .cl{position:absolute;right:18px;top:18px;width:28px;height:28px;border-radius:50%;background:var(--v0);border:none;color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.sh .cl:hover{background:var(--v1);color:var(--v7)}
.sh .mn{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:4px;padding-right:36px;line-height:1.3}
.sh .ms{font-size:16px;font-weight:700;color:var(--v7);margin-bottom:10px;font-variant-numeric:tabular-nums}
.sh .mm{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:10px}
.sh .mt{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.sh .mt span{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--v1);color:var(--v5)}
.sh .mt span.wl{background:rgba(16,185,129,.07);color:var(--ok)}

/* === Sheet 内的分区卡片 === */
.sh .sec{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.sh .sec-tt{font-size:12px;font-weight:700;color:var(--v7);margin-bottom:8px;display:flex;align-items:center;gap:5px;letter-spacing:.5px}
.sh .sec-tt::before{content:'';display:inline-block;width:3px;height:12px;background:var(--v5);border-radius:2px}

/* JD 解析后的分块 */
.jd-sec{margin-bottom:12px}
.jd-sec .jd-h{font-size:12px;font-weight:700;color:var(--v5);margin-bottom:5px;padding:3px 8px;background:var(--v0);border-radius:6px;display:inline-block}
.jd-sec .jd-b{font-size:13px;color:#3d3460;line-height:1.75;white-space:pre-wrap;padding-left:4px}
.jd-raw{font-size:13px;color:#3d3460;line-height:1.75;white-space:pre-wrap}

/* Boss 卡片 */
.boss-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--v0);border-radius:10px}
.boss-row .av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--v3),var(--v5));display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;flex-shrink:0}
.boss-row .bi{flex:1;min-width:0}
.boss-row .bi .bn{font-size:13px;font-weight:600;color:var(--t1)}
.boss-row .bi .bp{font-size:11px;color:var(--t2);margin-top:1px}

/* 地址模块（底部，含地图占位） */
.addr-card{background:var(--v0);border-radius:12px;padding:12px;display:flex;gap:10px;align-items:flex-start}
.addr-card .ic{width:32px;height:32px;border-radius:8px;background:var(--v1);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.addr-card .ai{flex:1;min-width:0}
.addr-card .ai .al{font-size:13px;color:var(--t1);font-weight:500;line-height:1.5;word-break:break-all}
.addr-card .ai .am{font-size:11px;color:var(--t3);margin-top:3px}
.addr-card .ai .am b{color:var(--v5);font-weight:600}
.addr-empty{background:var(--v0);border-radius:12px;padding:14px;text-align:center;color:var(--t3);font-size:12px}

/* 时效追踪 */
.track-row{display:flex;gap:8px;font-size:11px;color:var(--t2);flex-wrap:wrap}
.track-row .tk{padding:3px 8px;border-radius:6px;background:rgba(124,92,252,.06);color:var(--v5)}
.track-row .tk.hi{background:rgba(16,185,129,.10);color:var(--ok);font-weight:600}

.sh .btn{display:block;text-align:center;padding:13px;background:var(--v7);color:#fff;border-radius:12px;font-size:15px;font-weight:600;text-decoration:none;margin-top:16px;border:none;cursor:pointer;transition:opacity .15s,transform .1s}
.sh .btn:active{opacity:.85;transform:scale(.98)}

/* Toast 提示 */
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:rgba(26,21,48,.92);color:#fff;padding:10px 18px;border-radius:22px;font-size:12px;z-index:400;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);max-width:80%;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(-4px)}

.totop{position:fixed;right:16px;bottom:20px;width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--v5);font-size:16px;z-index:40}
.totop.on{display:flex}
.totop:active{transform:scale(.9)}

.fo{text-align:center;padding:20px;color:var(--t3);font-size:11px}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>

<div class="cloud-top"></div>

<div class="hd">
  <div class="row1">
    <div class="logo">三瓜两枣收集器</div>
    <div class="sub"><span id="upd">7月9日 更新</span><br><span>共 <b id="tc">0</b> 个岗位</span></div>
  </div>
  <div class="sr-wrap">
    <span class="ic">🔍</span>
    <input id="q" placeholder="搜职位、公司、技能..." aria-label="搜索职位" oninput="R()">
  </div>
  <div class="st" id="st"></div>
</div>

<div class="fl" id="fl"><span class="clr hide" id="clr" onclick="clrAll()">✕ 清除</span></div>
<div class="ct" id="ct"></div>
<div class="ls" id="ls"></div>

<button class="totop" id="totop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="返回顶部">↑</button>

<div class="ov" id="ov" onclick="if(event.target===this)CM()">
  <div class="sh" id="sh" onclick="event.stopPropagation()"><div class="gh"></div><div id="mc"></div></div>
</div>

<div class="fo">三瓜两枣收集器 · 福州本地岗位 · 每日自动更新</div>

<div class="toast" id="toast"></div>

<script>
/* ===== 真实数据样例（字段对齐 zhipin_jobs_最新.csv 的 22 列） ===== */
/* 关键字段：
   n职位名称 b公司名称 s薪资 c城市 d区域 exp经验 deg学历 st融资 sc规模 ind行业

function salSl(s){
  if(!s)return '0';
  // 月薪 K
  var m=s.match(/(\d+)-(\d+)K/);
  if(m){
    var hi=parseInt(m[2]);
    if(hi<=8)return '2';
    if(hi<=15)return '3';
    return '4';
  }
  // 时薪 元/时 - 按每月22天8小时=176小时换算成月薪档位
  var h=s.match(/(\d+)-(\d+)元\/时/);
  if(h){
    var hourlyHi=parseInt(h[2]);
    var monthlyHi=hourlyHi*176/1000; // 元/时 * 176h / 1000 = K
    if(monthlyHi<=8)return '2';
    if(monthlyHi<=15)return '3';
    return '4';
  }
  // 日薪 元/天 - 按22天/月换算
  var d=s.match(/(\d+)-(\d+)元\/天/);
  if(d){
    var dailyHi=parseInt(d[2]);
    var monthlyD=dailyHi*22/1000;
    if(monthlyD<=8)return '2';
    if(monthlyD<=15)return '3';
    return '4';
  }
  return '0';
}

  if(CF!=='全部')L=L.filter(function(j){return (j.src||'')===CF;});
  if(FS.sal)L=L.filter(function(j){return salSl(j.s)===FS.sal;});
  if(FS.exp==='lo')L=L.filter(function(j){var e=j.exp||'';return e.indexOf('不限')>-1||e.indexOf('应届')>-1||e.indexOf('1年')>-1||e.indexOf('1-3')>-1;});
  else if(FS.exp==='mid')L=L.filter(function(j){var e=j.exp||'';return e.indexOf('3-5')>-1||e.indexOf('5-10')>-1||e.indexOf('10年')>-1;});
  if(FS.time==='fresh')L=L.filter(function(j){return j.tag==='今日新上';});
  if(ST_ON==='today')L=L.filter(function(j){return j.tag==='今日新上';});
  else if(ST_ON==='d3')L=L.filter(function(j){return j.tag==='今日新上'||j.tag==='本周';});
  else if(ST_ON==='hi')L=L.filter(function(j){return salSl(j.s)==='4';});
  else if(ST_ON==='jd')L=L.filter(function(j){return j.jd&&j.jd.length>50;});
  if(q)L=L.filter(function(j){return (j.n+' '+j.b+' '+(j.jd||'')+' '+(j.sk||[]).join(' ')).toLowerCase().indexOf(q)>-1;});
  CL=L;

  var today=L.filter(function(j){return j.tag==='今日新上';}).length;
  var week=L.filter(function(j){return j.tag==='本周';}).length;
  var withJd=L.filter(function(j){return j.jd&&j.jd.length>50;}).length;
  var hi=L.filter(function(j){return salSl(j.s)==='4';}).length;
  document.getElementById('st').innerHTML=
    '<div class="sc '+(ST_ON==='today'?'on':'')+'" data-st="today"><b>'+today+'</b><span>今日新上</span></div>'+
    '<div class="sc '+(ST_ON==='d3'?'on':'')+'" data-st="d3"><b>'+(today+week)+'</b><span>本周在挂</span></div>'+
    '<div class="sc '+(ST_ON==='jd'?'on':'')+'" data-st="jd"><b>'+withJd+'</b><span>含JD详情</span></div>'+
    '<div class="sc '+(ST_ON==='hi'?'on':'')+'" data-st="hi"><b>'+hi+'</b><span>15K+高薪</span></div>';

  var el=document.getElementById('ls');
  if(!L.length){
    el.innerHTML='<div class="em"><div class="big">🪐</div>没有匹配的岗位<br><small style="color:var(--t3);font-size:11px">换个筛选条件试试</small><br><button class="btn" onclick="clrAll()">清空所有筛选</button></div>';
    return;
  }
  var h='';
  for(var i=0;i<L.length;i++){
    var j=L[i];
    // 时效标签
    var tm=j.tag||'',tc='';
    if(tm==='今日新上'){tc='t-new';}
    else if(tm==='本周'){tc='t-week';}
    else{tc='t-stale';}
    // 跨天追踪：ftime !== ltime 时显示连挂N天，否则不显示（避免与今日新上重复）
    var trackTag='';
    if(j.ftime&&j.ltime&&j.ftime!==j.ltime){
      trackTag='<span class="track">🔥 连挂 '+(dateDiff(j.ftime,j.ltime)+1)+' 天</span>';
    }
    var skh='';
    if(j.sk&&j.sk.length){skh='<div class="sk">';for(var k=0;k<j.sk.length&&k<3;k++)skh+='<span>'+j.sk[k]+'</span>';skh+='</div>';}
    var meta='<span>📍 '+(j.d?j.c+'·'+j.d:j.c)+'</span>';
    if(j.exp)meta+='<span>⏱ '+j.exp+'</span>';
    if(j.deg)meta+='<span>🎓 '+j.deg+'</span>';
    var r2=j.b||'未知公司';
    if(j.sc)r2+='<i></i>'+j.sc;
    if(j.ind)r2+='<i></i>'+j.ind;
    h+='<div class="cd" data-i="'+i+'">'+
       '<div class="r1"><span class="n">'+j.n+'</span><span class="s">'+j.s+'</span></div>'+
       '<div class="r2">'+r2+'</div>'+
       '<div class="r3">'+meta+'</div>'+skh+
       '<div class="ft"><span class="tm '+tc+'">'+tm+'</span>'+(trackTag||'<span>'+(j.st||'')+'</span>')+'</div></div>';
  }
  el.innerHTML=h;
}

function dateDiff(a,b){
  var d1=new Date(a),d2=new Date(b);
  return Math.round((d2-d1)/86400000);
}

document.getElementById('st').addEventListener('click',function(e){
  var s=e.target.closest('.sc');if(!s)return;
  var k=s.getAttribute('data-st');if(!k)return;
  ST_ON=(ST_ON===k?'':k);R();
});

/* ===== JD 解析：把 【】 标记切成独立分块（关键修复"文字堆一起"） ===== */
function parseJD(jd){
  if(!jd)return '';
  // 用正则匹配 【...】 标题，把后续内容切到下一个【或结尾
  var parts=[];
  var re=/【([^】]+)】([\s\S]*?)(?=【[^】]+】|$)/g;
  var m;
  while((m=re.exec(jd))!==null){
    var title=m[1].trim();
    var body=m[2].trim();
    if(body)parts.push({title:title,body:body});
  }
  if(!parts.length){
    // 没找到 【】，原文返回
    return '<div class="jd-raw">'+escapeHtml(jd)+'</div>';
  }
  return parts.map(function(p){
    return '<div class="jd-sec"><div class="jd-h">'+escapeHtml(p.title)+'</div><div class="jd-b">'+escapeHtml(p.body)+'</div></div>';
  }).join('');
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
}

function OM(i){
  var j=CL[i];if(!j)return;
  var skh=j.sk&&j.sk.length?'<div class="mt">'+j.sk.map(function(s){return '<span>'+escapeHtml(s)+'</span>';}).join('')+'</div>':'';
  var wlh=j.wel&&j.wel.length?'<div class="mt">'+j.wel.map(function(w){return '<span class="wl">🎁 '+escapeHtml(w)+'</span>';}).join('')+'</div>':'';

  // 公司一行
  var mm='🏢 '+escapeHtml(j.b||'未知公司');
  if(j.sc)mm+=' · '+escapeHtml(j.sc);
  if(j.st)mm+=' · '+escapeHtml(j.st);
  if(j.ind)mm+=' · '+escapeHtml(j.ind);
  mm+='<br>📍 '+escapeHtml(j.c);
  if(j.d)mm+=' · '+escapeHtml(j.d);
  if(j.exp)mm+=' · ⏱ '+escapeHtml(j.exp);
  if(j.deg)mm+=' · 🎓 '+escapeHtml(j.deg);

  // 跨天追踪：今日新上(diff=1)和连挂N天(diff>1)都显示
  var trackHtml='';
  if(j.ftime&&j.ltime){
    var diff=dateDiff(j.ftime,j.ltime)+1;
    trackHtml='<div class="track-row"><span class="tk">📅 首次 '+j.ftime+'</span><span class="tk">🔄 最近 '+j.ltime+'</span>'+(diff>1?'<span class="tk hi">🔥 连挂 '+diff+' 天</span>':'<span class="tk">🆕 今日首次采集</span>')+'</div>';
  }

  // Boss 卡片
  var bossHtml='';
  if(j.bn){
    var initial=j.bn.charAt(0);
    bossHtml='<div class="boss-row"><div class="av">'+escapeHtml(initial)+'</div><div class="bi"><div class="bn">'+escapeHtml(j.bn)+'</div><div class="bp">'+escapeHtml(j.bp||'招聘者')+' · 可直接沟通</div></div></div>';
  }

  // JD 区块（解析分块）
  var jdHtml='';
  if(j.jd&&j.jd.length>20){
    jdHtml='<div class="sec"><div class="sec-tt">职位描述</div>'+parseJD(j.jd)+'</div>';
  }else{
    jdHtml='<div class="sec"><div class="sec-tt">职位描述</div><div class="addr-empty">📡 该岗位暂未采集到详细 JD</div></div>';
  }

  // 地址模块（底部，可空）
  var addrHtml='';
  if(j.addr){
    addrHtml='<div class="sec"><div class="sec-tt">工作地址</div><div class="addr-card"><div class="ic">📍</div><div class="ai"><div class="al">'+escapeHtml(j.addr)+'</div><div class="am">'+escapeHtml(j.c)+(j.d?' · '+escapeHtml(j.d):'')+' · <b>点击查看地图</b></div></div></div></div>';
  }else{
    addrHtml='<div class="sec"><div class="sec-tt">工作地址</div><div class="addr-empty">📡 该岗位未采集到详细地址<br><small style="font-size:11px;color:var(--t3)">可在 BOSS直聘 App 内查看或咨询 '+escapeHtml(j.bn||'招聘者')+'</small></div></div>';
  }

  // 福利 + 技能
  var tagHtml='';
  if(skh||wlh){
    tagHtml='<div class="sec"><div class="sec-tt">技能与福利</div>'+skh+wlh+'</div>';
  }

  // 时效追踪
  var trackSec='';
  if(trackHtml){
    trackSec='<div class="sec"><div class="sec-tt">采集时效</div>'+trackHtml+'</div>';
  }

  document.getElementById('mc').innerHTML=
    '<button class="cl" onclick="CM()" aria-label="关闭">✕</button>'+
    '<div class="mn">'+escapeHtml(j.n)+'</div>'+
    '<div class="ms">'+escapeHtml(j.s)+'</div>'+
    '<div class="mm">'+mm+'</div>'+
    tagHtml+
    jdHtml+
    trackSec+
    addrHtml+
    (bossHtml?'<div class="sec"><div class="sec-tt">招聘者</div>'+bossHtml+'</div>':'')+
    '<button class="btn" onclick="applyJob(this,'+i+')">立即申请</button>';

  // B4 修复：重置 sheet 滚动位置到顶部（需在动画启动后用 rAF 重置，否则浏览器会保留上次位置）
  var sh=document.getElementById('sh');
  sh.scrollTop=0;
  // 动画期间再次重置，确保滑动动画完成后仍在顶部
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      sh.scrollTop=0;
    });
  });

  // B9 修复：ARIA 属性
  var ov=document.getElementById('ov');
  ov.setAttribute('role','dialog');
  ov.setAttribute('aria-modal','true');
  ov.setAttribute('aria-label','职位详情：'+j.n);
  sh.setAttribute('role','document');

  ov.classList.add('on');
  document.body.style.overflow='hidden';
}

function applyJob(btn, i){
  var j=CL[i];if(!j)return;
  // B10 修复：用 toast 替代 alert
  showToast('正在跳转到 BOSS直聘 · '+(j.b||''));
  // 实际场景：window.open(j.url, '_blank');
}

// Toast 提示
var _toastTimer=null;
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('on');
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.classList.remove('on');},2000);
}

function CM(){
  document.getElementById('ov').classList.remove('on');
  document.body.style.overflow='';
}

// B5 修复：ESC 键关闭 sheet
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'||e.keyCode===27){
    if(document.querySelector('.ov.on'))CM();
  }
});

// B10 补充：拖拽 handle 关闭 sheet（移动端手势）
(function(){
  var sh=document.querySelector('.sh');
  var gh=document.querySelector('.gh');
  if(!gh)return;
  var startY=0,curY=0,dragging=false;
  gh.addEventListener('touchstart',function(e){
    dragging=true;startY=e.touches[0].clientY;curY=startY;
    sh.style.transition='none';
  },{passive:true});
  gh.addEventListener('touchmove',function(e){
    if(!dragging)return;
    curY=e.touches[0].clientY;
    var dy=Math.max(0,curY-startY);
    sh.style.transform='translateY('+dy+'px)';
  },{passive:true});
  gh.addEventListener('touchend',function(){
    if(!dragging)return;
    dragging=false;
    sh.style.transition='';
    var dy=curY-startY;
    if(dy>80){
      CM();
    }
    sh.style.transform='';
  });
})();

R();
</script>
</body>
</html>
